  ## 4. FRONTEND APPLICATIONS
  ═══════════════════════════════════════════════════════════════════════════════
  
  ### Common Technology Stack
  - Next.js 14.2.x / React 18.x / TypeScript 5.x
  - TailwindCSS 3.x + Material UI 5.x
  - Formik + Yup (forms)
  - Axios 1.8.x (API client)
  - React Query (server state)
  
  ### bidding-admin (Admin Dashboard - Port 4007)
  
  **Features**: Campaign CRUD, Session management, Student management, 
  Class/Course management, Simulation execution, User/role management
  
  **Structure**:
  ```
  bidding-admin/src/
  ├── app/                    # Next.js App Router
  │   ├── (auth)/            # Protected routes
  │   │   ├── campaigns/     # Campaign management
  │   │   ├── sessions/      # Session management
  │   │   ├── students/      # Student management
  │   │   ├── classes/       # Class management
  │   │   └── simulations/   # Simulation pages
  │   └── login/             # Public login
  ├── components/            # React components
  │   ├── campaign/          # CampaignForm, CampaignTable, PhaseConfig
  │   ├── common/            # DataTable, Modal, Loader
  │   └── forms/             # Form components
  └── src/
      ├── api/               # Axios config + endpoint files
      ├── hooks/             # useCampaigns, useAuth
      ├── stores/            # Zustand stores (authStore, uiStore)
      ├── types/             # TypeScript interfaces
      └── utils/             # date, validation utilities
  ```
  
  ### bidding-web (Student Portal - Port 4006)
  
  **Features**: View sessions/courses, Submit bids, Add/drop courses,
  Manage waitlists, View simulation results
  
  **Structure**:
  ```
  bidding-web/src/
  ├── app/                    # Next.js App Router
  │   ├── (auth)/            # Protected routes
  │   │   ├── bidding/       # Bidding interface
  │   │   ├── add-drop/      # Add-drop interface
  │   │   ├── waitlist/      # Waitlist management
  │   │   └── results/       # Results pages
  │   └── login/             # SSO login
  ├── components/            # React components
  │   ├── bid/               # BidSheet, CourseCard, PointsAllocator
  │   ├── course/            # Course display
  │   └── common/            # Shared components
  └── src/
      ├── api/               # API client
      ├── types/             # TypeScript types
      └── utils/             # Utilities
  ```
  
  ### State Management
  
  **React Query** (server state):
  ```typescript
  export function useCampaigns() {
    return useQuery('campaigns', fetchCampaigns);
  }
  export function useCreateCampaign() {
    return useMutation(createCampaign, {
      onSuccess: () => queryClient.invalidateQueries('campaigns')
    });
  }
  ```
  
  **Zustand** (client state - bidding-admin):
  ```typescript
  export const useAuthStore = create<AuthStore>((set) => ({
    user: null,
    token: null,
    setAuth: (user, token) => set({ user, token }),
    logout: () => set({ user: null, token: null }),
  }));
  ```
  
  ### API Client
  ```typescript
  // src/api/axios.ts
  const api = axios.create({
    baseURL: process.env.NEXT_PUBLIC_API_URL,
    headers: { 'Content-Type': 'application/json' },
  });
  api.interceptors.request.use((config) => {
    const token = Cookies.get('token');
    if (token) config.headers.Authorization = `Bearer ${token}`;
    return config;
  });
  ```
  
  ### TypeScript Types
  ```typescript
  export interface Campaign {
    id: number;
    name: string;
    status: CampaignStatus;
    startDate: string;
    endDate: string;
    phases: CampaignPhase[];
    studentFilters: StudentFilter[];
    courseFilters: CourseFilter[];
  }
  export enum CampaignStatus { DRAFT = 'draft', ACTIVE = 'active', COMPLETED = 'completed' }
  ```
  
  ### Component Pattern
  ```tsx
  'use client';
  import { useFormik } from 'formik';
  import * as Yup from 'yup';
  
  export function CampaignForm({ campaign, onSubmit, isLoading }: CampaignFormProps) {
    const formik = useFormik({
      initialValues: { name: campaign?.name ?? '', startDate: '', endDate: '' },
      validationSchema: Yup.object({
        name: Yup.string().required('Name is required'),
        endDate: Yup.date().min(Yup.ref('startDate'), 'End must be after start'),
      }),
      onSubmit,
    });
    return <form onSubmit={formik.handleSubmit}>{/* fields */}</form>;
  }
  ```
  
  ### Build Commands
  ```bash
  npm run start:dev    # Development
  npm run build        # Production build
  npm run build:int    # Integration
  npm run build:uat    # UAT
  npm run build:prd    # Production
  ```
  
