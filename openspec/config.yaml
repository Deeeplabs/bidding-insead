  ## 5. DATABASE
  ═══════════════════════════════════════════════════════════════════════════════
  
  ### Technology: MySQL 8.0 with Doctrine ORM
  
  ### Core Tables
  
  **campaign**
  - id, name, description, status, start_date, end_date, created_at, updated_at
  
  **campaign_phase_config** (phases: Pre-Bidding, Bidding, Add-Drop)
  - id, campaign_id, phase, start_date, end_date, is_active
  
  **campaign_student_filter** / **campaign_course_filter**
  - id, campaign_id, filter_type, filter_value
  
  **session**
  - id, campaign_id, name, type, phase, start_date, end_date, status, is_active
  
  **session_course**
  - id, session_id, course_id, course_cut_off_price
  
  **student**
  - id, people_soft_id (unique), email, first_name, last_name, promotion_id, status
  
  **student_data**
  - id, student_id (unique), gpa, total_points, used_points
  
  **bid**
  - id, student_id, session_id, class_id, points, status, type, rank
  - UNIQUE KEY (student_id, session_id, class_id)
  
  **classes**
  - id, course_id, campus_id, code, name, term, section, seats, instructor, schedule
  
  **class_promotions**
  - id, class_id, promotion_id, promotion_seats
  
  **course**
  - id, code (unique), title, description, credits, type, module_id
  
  **program** / **promotion** / **campus** / **module**
  - Standard reference tables
  
  **simulation**
  - id, session_id, status, started_at, completed_at, results (JSON)
  
  **exchange**
  - id, student_id, session_id, p3/p4/p5_campus_id, gpa_score, essays_score, points
  
  ### Key Indexes
  ```sql
  CREATE INDEX idx_bid_student_session ON bid(student_id, session_id);
  CREATE INDEX idx_bid_status ON bid(status);
  CREATE INDEX idx_session_campaign ON session(campaign_id);
  CREATE INDEX idx_classes_course ON classes(course_id);
  CREATE INDEX idx_student_promotion ON student(promotion_id);
  CREATE INDEX idx_campaign_status ON campaign(status);
  ```
  
  ### Migration Example
  ```php
  final class Version20240101120000 extends AbstractMigration
  {
      public function up(Schema $schema): void {
          $this->addSql('ALTER TABLE campaign ADD essay_deadline DATETIME DEFAULT NULL');
      }
      public function down(Schema $schema): void {
          $this->addSql('ALTER TABLE campaign DROP essay_deadline');
      }
  }
  ```
  
