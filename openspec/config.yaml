# =============================================================================
# INSEAD Bidding System - OpenSpec Configuration (Brownfield)
# =============================================================================
# Optimized for safe feature development and bug fixing on a live production
# system. Context is injected into ALL artifact prompts. Rules are injected
# only into their matching artifact type.
# =============================================================================

context: |
  # INSEAD Bidding System — Brownfield Context

  This is a **live production system** used by INSEAD business school for course bidding.
  Any change MUST preserve backward compatibility with in-flight campaigns, active sessions,
  and existing student data. There are no greenfield assumptions — everything already works;
  we're evolving it safely.

  ## Monorepo Layout

  ```
  insead/
  ├── bidding-api/      Symfony 6.4 · PHP 8.1+ · MySQL 8 · Redis 6 · Port 8000
  ├── bidding-admin/    Next.js 14 · Admin dashboard · Port 4007
  ├── bidding-web/      Next.js 14 · Student portal  · Port 4006
  └── openspec/         Specs, changes, config
  ```

  ## Architecture Overview

  ```
  bidding-web (Student Portal)     bidding-admin (Admin Dashboard)
       │                                │
       └────────────┬───────────────────┘
                    ▼
           bidding-api (REST API)
            │       │       │        │
         MySQL 8  Redis 6  S3  SSO/SAML+OAuth
  ```

  External integrations:
  - MuleSoft webhooks: `/api/webhook/{class,course,enrollment,student}/*`
  - PeopleSoft: GPA endpoint (GpaService)
  - AWS S3: Flex-switch file uploads
  - Azure OAuth + SAML SSO: Dual auth support

  ## Domain Model (Core Business Concepts)

  **Primary flow:**
  Program → Promotion → Student → Bid → Class → Course → Module

  **Campaign orchestration:**
  Campaign → CampaignPhaseConfig → CampaignModule → Session → Simulation → SimulationRun

  **Key entity relationships (bidding-api/src/Entity/):**
  | Entity | Key Fields | Relationships |
  |--------|-----------|---------------|
  | Campaign | phases, capital rules, credits | → Program, Promotion, Preset, CampaignModule[], CampaignPhaseConfig[], Session |
  | CampaignModule | core/elective, capital rules | → Campaign, Module, PresetModule? |
  | CampaignPhaseConfig | phase timing, dates | → Campaign |
  | Session | type, status, phase | → Campaign |
  | Bid | points, status, type, isFree | → Student, Campaign, CampaignPhaseConfig, CampaignModule, Classes |
  | Student | people_soft_id (unique) | → Promotion, StudentData, Exchange |
  | Classes | seats, section | → Course, Campus, ClassPromotions[] |
  | Course | code (unique), title, credits | → Module, CourseType |
  | Module | ModuleVariant[] | → Course[] |
  | Simulation/SimulationRun | allocation engine | → Session, SimulationClassDemand[] |
  | Exchange | campus, gpa/essay scores | → Student |
  | Preset/PresetModule | reusable templates | → Campaign[] |

  **Supporting entities:**
  - Adjustment/AdjustmentCourse/AdjustmentType — post-simulation corrections
  - FlexSwitchRequest/FlexSwitchFile/FlexSwitchConfiguration — course switch workflow
  - Group/GroupMember/GroupSimulation — group bidding
  - Notification/NotificationBatch/NotificationTemplate/NotificationSetting/NotificationType — notifications
  - Order/OrderCoursePack/OrderStatus — course pack ordering
  - PolicyAcceptance/UserPolicyAcceptance — compliance
  - FeatureAccess — feature flags
  - AuditLog/CampaignAuditLog/ApiLogs — audit trail
  - Printshop/PrintshopReturn — printshop management
  - Project/ProjectMember — project management
  - PromotionSetting/PromotionPeriod — promotion configuration
  - CourseRanking — course ranking data
  - SessionCourse — session-course mapping

  **Status types are separate database entities** (BidStatus, SessionStatus, ClassStatus,
  CoursePackStatus, ClassWaitlistStatus, etc.), NOT PHP enums. Reference them via repository lookups.

  ## Backend — bidding-api

  **Request lifecycle:**
  ```
  HTTP Request
    → Security (ApiTokenAuthenticator / AzureOAuthAuthenticator / SAML)
    → Controller (PHP 8.1 Route/OA attributes)
    → Request DTO (DtoInterface + DtoArgumentResolver)
    → Domain Service (business logic)
    → Repository (Doctrine ORM)
    → Response DTO (Transformer classes)
    → JSON Response
  ```

