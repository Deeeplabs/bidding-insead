  ## 9. COMMON CHANGE PATTERNS
  ═══════════════════════════════════════════════════════════════════════════════
  
  ### Adding a New Field to an Entity
  1. Add property to Entity class
  2. Create Doctrine migration
  3. Add to Request/Response DTOs
  4. Update API controller
  5. Update admin UI forms/tables
  6. Update student UI if applicable
  7. Add tests
  
  ### Creating a New API Endpoint
  1. Create Controller with Route attribute
  2. Create Request DTO with validation
  3. Create Response DTO transformer
  4. Add to security firewall
  5. Add OpenAPI documentation
  6. Update frontend API client
  7. Add integration tests
  
  ### Fixing a Bug
  1. Identify affected components (API, Admin, Web)
  2. Write failing test that reproduces bug
  3. Implement fix
  4. Verify all related tests pass
  5. Test in development environment
  6. Document any data migration needs
  
  ═══════════════════════════════════════════════════════════════════════════════
  ## 10. IMPORTANT NOTES
  ═══════════════════════════════════════════════════════════════════════════════
  
  1. **Database Changes**: Always create Doctrine migrations
  2. **API Changes**: Update OpenAPI annotations and test with Postman
  3. **Campaign Logic**: Campaign phases control feature visibility
  4. **Student Filters**: Campaigns have student_filters and course_filters
  5. **Simulation Dependencies**: Many features depend on simulation runs
  6. **Multi-app Coordination**: Some features span all three apps

# =============================================================================
# Per-artifact Rules
# =============================================================================
rules:
  proposal:
    - Keep proposals focused on a single feature or fix
    - Include impact analysis for all three apps (api, admin, web)
    - Identify which entities and services are affected
    - Note any migration requirements
    - Consider backward compatibility
  
  specs:
    - Define clear acceptance criteria
    - Include API endpoint specifications when applicable
    - Specify validation rules for inputs
    - Consider edge cases for bidding scenarios
    - Document impact on existing sessions/campaigns
  
  design:
    - Follow existing architecture patterns (Flow/Module for complex operations)
    - Use DTO pattern for all API changes
    - Consider database query optimization
    - Plan for backward compatibility with existing data
    - Include database migration strategy if schema changes
    - Reference existing similar implementations
  
  tasks:
