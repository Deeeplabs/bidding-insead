  ## 7. CODING CONVENTIONS
  ═══════════════════════════════════════════════════════════════════════════════
  
  ### PHP/Symfony (bidding-api)
  - Use PHP 8.1+ attributes (not annotations)
  - Follow PSR-12 coding standard
  - Use constructor dependency injection
  - Create DTOs for all API request/response
  - Use Doctrine migrations for schema changes
  - Write PHPUnit tests for services
  - Use MicroMapper for entity-DTO transformations
  
  ### TypeScript/React (bidding-admin & bidding-web)
  - Use TypeScript strict mode
  - Use functional components with hooks
  - Use React Query for server state
  - Use Zustand for client state (bidding-admin)
  - Follow ESLint + Prettier configuration
  - Use conventional commits (commitlint)
  
