  ## 2. DOMAIN MODEL
  ═══════════════════════════════════════════════════════════════════════════════
  
  ### Core Concepts
  - **Campaigns**: Time-bounded bidding events with phases (Pre-Bidding, Bidding, Add-Drop)
  - **Sessions**: Individual bidding sessions within campaigns
  - **Bids**: Student bids on classes with point allocation
  - **Simulations**: Calculation of bid outcomes and cutoff prices
  - **Waitlists**: Queue management for oversubscribed courses
  - **Campus Exchange**: Cross-campus course allocation for exchange students
  - **Promotions**: Student cohorts/groups (e.g., MBA2024, EMBA2025)
  
  ### Entity Relationships
  ```
  ┌─────────────┐     ┌─────────────┐     ┌─────────────┐
  │   Program   │──┬──│  Promotion  │──┬──│   Student   │
  └─────────────┘  │  └─────────────┘  │  └──────┬──────┘
                   │  ┌─────────────┐   │         │
                   └──│   Campus    │   │         │
                      └─────────────┘   │         │
  ┌─────────────┐     ┌─────────────┐   │   ┌─────┴─────┐
  │   Course    │──┬──│   Classes   │───┴───│    Bid    │
  └─────────────┘  │  └─────────────┘       └─────┬─────┘
  ┌─────────────┐  │  ┌─────────────┐       ┌────┴────┐
  │   Module    │──┘  │  Campaign   │───────│ Session │
  └─────────────┘     └─────────────┘       └─────────┘
  ```
  
  ### Core Entities
  
  **Campaign** - Top-level container for bidding events
  - Fields: id, name, status (Draft/Active/Completed), start_date, end_date
  - Relations: has_many Sessions, CampaignModules, StudentFilters, CourseFilters
  
  **Session** - Specific bidding round within a campaign
  - Fields: id, name, type (Bidding/CampusExchange), phase, start_date, end_date
  - Relations: belongs_to Campaign, has_many Bids, SessionCourses, Simulations
  
  **Student** - Bidding participant
  - Fields: id, people_soft_id, email, first_name, last_name, status
  - Relations: belongs_to Promotion, has_one StudentData, has_many Bids
  
  **Bid** - Student's bid on a class
  - Fields: id, points, status (Pending/Enrolled/Waitlisted/Dropped), type (Primary/Backup)
  - Relations: belongs_to Student, Session, Class
  
  **Class** - Course section offered in a term
  - Fields: id, code, name, seats, term, section, instructor
  - Relations: belongs_to Course, Campus, has_many ClassPromotions, Bids
  
  **Course** - Academic course
  - Fields: id, code, title, credits, type (Core/Elective)
  - Relations: belongs_to Module, has_many Classes
  
  ### Supporting Entities
  - **Program**: Academic program (MBA, EMBA)
  - **Promotion**: Student cohort (MBA2024)
  - **Campus**: Location (Fontainebleau, Singapore, Abu Dhabi)
  - **Module**: Course category
  - **Simulation**: Bid allocation calculation run
  - **Exchange**: Campus exchange student data
  
  ### Key Business Rules
  
  1. **Bid Point Allocation**
     - Students receive fixed points per session
     - Points distributed across selected classes
     - Min/max points per class may apply
  
  2. **Enrollment Priority**
     - Total score = bid_points + gpa_score + essay_score (exchange)
     - Higher scores get priority; ties broken by timestamp
  
  3. **Phase Transitions**
     - Pre-Bidding: Course info visible, no bidding
     - Bidding: Active bid submission
     - Add-Drop: Post-allocation adjustments
     - Results: Final allocations visible
  
  4. **Waitlist Management**
     - Join waitlist for full classes
     - Auto-promotion when seats open
     - Priority based on bid points
  
