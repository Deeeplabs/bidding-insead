context: |
  # INSEAD Bidding System

  Course bidding platform for INSEAD business school. Brownfield monorepo with three apps sharing one API.

  ## Architecture

  ```
  bidding-web (Student Portal, Next.js 14, port 4006)
  bidding-admin (Admin Dashboard, Next.js 14, port 4007)
       │                  │
       └──────┬───────────┘
              ▼
  bidding-api (Symfony 6.4, PHP 8.1+)
       │          │          │
    MySQL 8    Redis 6    SSO/SAML+Azure OAuth
  ```

  External integrations: MuleSoft webhooks (/api/webhook/*), PeopleSoft GPA endpoint, AWS S3 (flex-switch files).

  ## Domain Model

  Core flow: Program → Promotion → Student → Bid → Class → Course → Module
  Campaign orchestration: Campaign → CampaignPhaseConfig → CampaignModule → Session → Simulation

  Key entities (bidding-api/src/Entity/):
  - Campaign: has session, preset, program, promotion, phases, modules, capital/credit rules
  - CampaignPhaseConfig: phase timing per campaign
  - CampaignModule: module-level config (core/elective, capital rules)
  - Session: belongs_to Campaign, has type (SessionType), status (SessionStatus), phase (SessionPhase)
  - Bid: belongs_to Student+Campaign+CampaignPhaseConfig+CampaignModule+Classes, has points, status (BidStatus), type (BidType), isFree flag, coursePackStatus
  - Student: people_soft_id (unique), belongs_to Promotion, has StudentData (points/credits)
  - Classes: course sections with seats, belongs_to Course+Campus, has ClassPromotions
  - Course: code (unique), title, credits, belongs_to Module, has CourseType
  - Simulation/SimulationRun/SimulationClassDemand: bid allocation engine
  - Exchange: cross-campus data (p3/p4/p5 campus, gpa_score, essays_score)
  - Adjustment/AdjustmentCourse/AdjustmentType: post-simulation adjustments
  - FlexSwitch*/: course switch requests with file uploads and approvals
  - Group/GroupMember/GroupSimulation: group bidding support
  - Notification/NotificationBatch/NotificationTemplate/NotificationSetting: email/notification system
  - Preset/PresetModule: reusable campaign templates
  - Order/OrderCoursePack: course pack ordering
  - PolicyAcceptance/UserPolicyAcceptance: policy compliance tracking
  - FeatureAccess: feature flag management
  - AuditLog/CampaignAuditLog/ApiLogs: audit trail

  Status enums are separate entities (BidStatus, SessionStatus, ClassStatus, etc.), not PHP enums.

  ## Backend (bidding-api)

  Request flow: HTTP → Controller → (Request DTO via DtoArgumentResolver) → Domain Service → Repository → Response DTO → JSON

  Directory structure:
  ```
  src/
  ├── Controller/Api/
  │   ├── Admin/SimulationDashboardController
  │   ├── Student/  (Bidding/, CampusExchange/, Campaign/, Class/, Dashboard/, FlexSwitch/, Waitlist/, Promotion/, Rule/)
  │   └── Webhook/  (Class/, Course/, Enrollment/, Student/)
  ├── Domain/       (Adjustment/, AdminUser/, AuditLog/, Backup/, Bid/, Campaign/, Campus/, Class/, Course/, Dashboard/, Exchange/, FeatureAccess/, FlexSwitch/, JobQueue/, Notification/, Permission/, Program/, Promotion/, Query/, Role/, Session/, Simulation/, Student/, Theme/, User/, UserToken/)
  ├── Dto/Request/  (DtoInterface, Transformer/)
  ├── Dto/Response/ (Transformer/)
  ├── Entity/       (90+ entities, Traits/)
  ├── Flow/         (AbstractFlow, BiddingFlow, CampusExchangeFlow, ElectiveAddDropFlow, Context/, Result/)
  ├── Module/       (Setup/, Bidding/, Simulation/, AddDrop/, CampusExchange/, Waitlist/)
  ├── Event/        (WaitListPostEvent)
  ├── EventListener/, EventSubscriber/
  ├── Message/, MessageHandler/  (async messaging)
  ├── Repository/, Security/, Service/, Store/
  ├── Helper/, Logger/, Monolog/, Pagination/, Serializer/, Exception/
  └── DataFixtures/, Doctrine/, DtoArgumentResolver/
  ```

  Flow/Module pattern for complex operations:
  - BiddingFlow: Setup → Bidding → Simulation → AddDrop → Waitlist
  - CampusExchangeFlow: for exchange student bidding
  - ElectiveAddDropFlow: for post-simulation add/drop
  - FlowContext carries data between modules
  - Each Module implements ModuleInterface with execute(FlowContext)

  Security: ApiTokenAuthenticator (Bearer), ApiUserAuthenticator, AzureOAuthAuthenticator, SAML auth
  - /api/webhook/*: Basic auth; /api/*: Bearer token
  - Voter-based authorization in Security/Voter/

  Testing: PHPUnit in tests/Unit/ (Controller/, Domain/)

  ## Frontend - bidding-admin

  Structure: src/app/(authenticated)/ routes: campaign/, campuses/, course-list/, dashboard/, entry/, flex-switch/, integration/, mba/, monitoring-analytics/, notification-centre/, preset/, programme/, students/, user-management/
  API layer: src/src/ with domain folders (bid/, bidding/, campaign-management/, session/, simulation/, student/, class/, course/, exchange/, flex-switch/, notification/, preset/, promotion/, programme-management/, role-management/, user-management/, admin-user/, adjustment/, backup/, campus/, dashboard/, monitoring-analytics/, theme-management/)
  Each domain folder typically has: api service, hooks (React Query), types
  State: Zustand stores for client state, React Query for server state
  Forms: Formik + Yup validation
  UI: TailwindCSS + Material UI 5.x
  Auth: SSO token service, session context

  ## Frontend - bidding-web

  Feature-based architecture in src/features/:
  - auth/ (SSO login, components/, hooks/, services/, types/)
  - bidding/ (components/, constants/, hooks/, pages/, types/, utils/)
  - courses/, dashboard/, notification/, profile/, switch/
  Bidding types: CampaignBiddingResponse, FormValues (capital_granted/spent/left, credits, primary_course/backup_course), BiddingConfig, PrimaryBids, AvailableCourse
  API: Axios client in src/lib/api/ (client-browser.ts, client-server.ts, interceptors, mutations/, queries/, services/)
  UI: Ant Design (antd-provider), TailwindCSS, custom Card/Modal/Table/ErrorBoundary components
  State: React Query (query-provider), user context (user-provider), notification context
  Hooks: use-bidding-form, use-bidding-courses, use-course-conflicts, use-add-drop-waitlist-form, use-pre-bidding-form

  ## Key Business Rules

  1. Capital (points) allocation: Students get capital per campaign, distributed across bids per module
  2. Campaign has minCapitalGranted/maxCapitalGranted and minCreditsToFulfill/maxCreditsToFulfill
  3. Bids have primary and backup types; backup_size is configurable per campaign
  4. Enrollment priority: bid_points + gpa_score + essay_score; ties by timestamp
  5. Campaign phases: defined via CampaignPhaseConfig, control what actions students can take
  6. Simulation runs calculate cutoff prices and allocate students to classes
  7. Waitlist: auto-promotion when seats open, priority by bid points
  8. Flex Switch: course switch requests with file upload, approval workflow
  9. Group bidding: students bid as groups with shared simulation
  10. Course packs: bundled course ordering system

  ## Conventions

  PHP/Symfony:
  - PHP 8.1+ attributes (not annotations) for ORM mappings and routes
  - PSR-12 coding standard
  - Constructor dependency injection (autowire: true in services.yaml)
  - Request DTOs implement DtoInterface, resolved by DtoArgumentResolver
  - Response DTOs use Transformer/ classes for entity-to-DTO conversion
  - Doctrine migrations in migrations/ (bin/console make:migration)
  - OpenAPI docs via NelmioApiDocBundle (#[OA\...] attributes)
  - One controller per action pattern (single __invoke method)

  TypeScript/React:
  - TypeScript strict mode, Next.js App Router ('use client' for interactive components)
  - React Query for server state (queries/mutations), Zustand for client state (bidding-admin)
  - Formik + Yup for forms (bidding-admin), custom hooks for forms (bidding-web)
  - ESLint + Prettier, conventional commits (commitlint)
  - Feature-based folder structure in bidding-web
  - Domain-based folder structure in bidding-admin/src/src/

  ## Development

  ```
  bidding-api:   ./deploy/scripts/up-dev.sh && bin/console doctrine:migrations:migrate
  bidding-admin: npm run start:dev (port 4007)
  bidding-web:   npm run start:dev (port 4006)
  ```

  Environments: DEV (bidding-dev.insead.edu), INT (bidding-int.insead.edu), UAT (bidding-uat.insead.edu), PROD (bidding.insead.edu)
  Build variants: npm run build:{int,uat,prd}
  API docs: /api/doc (NelmioApiDocBundle)

  ## Change Patterns

  Adding a field: Entity property → migration → Request/Response DTO + Transformer → Controller → admin UI → web UI → tests
  New API endpoint: Controller (Route attribute, OA annotations) → Request DTO (DtoInterface) → Domain Service → Response DTO Transformer → Security voter if needed → frontend API client → tests
  New feature: Often spans all 3 apps; start with API, then admin, then web
  Bug fix: Identify affected app(s) → write failing test → fix → verify across apps
  Database change: ALWAYS create Doctrine migration, never manual SQL

rules:
  proposal:
    - Keep focused on a single feature or fix
    - Identify which apps are affected (api, admin, web) and their specific impact
    - List affected entities, domain services, and controllers by name
    - Note migration requirements (new columns, tables, indexes)
    - Consider backward compatibility with existing campaigns/sessions in progress
    - Identify if Flow/Module architecture applies (complex multi-step operations)

  specs:
    - Use Given/When/Then format for scenarios
    - Include API endpoint specs (method, path, request/response shape) when applicable
    - Specify validation rules matching existing DtoInterface patterns
    - Cover edge cases: active campaigns, in-progress simulations, concurrent bids
    - Reference existing similar behavior before defining new patterns
    - Document impact on existing sessions/campaigns data

  design:
    - Follow existing patterns: check similar implementations in the codebase first
    - Use Flow/Module pattern for complex multi-step operations
    - Use DTO pattern (DtoInterface + DtoArgumentResolver) for all API request/response
    - Plan Doctrine migration strategy (up and down methods)
    - Consider query optimization (indexes, eager/lazy loading, DQL)
    - Plan backward compatibility with existing data
    - Specify file locations using actual project paths
    - Note if Transformer classes need updates for DTO changes

  tasks:
    - Order by dependency: migration → API entities/services → API controllers → admin UI → web UI → tests
    - Keep individual tasks completable in one session (under 2 hours)
    - Include specific file paths (e.g., src/Entity/Campaign.php, src/Domain/Bid/Service/)
    - Add PHPUnit test tasks for API changes (tests/Unit/)
    - Add Jest test tasks for frontend changes
    - Mark cross-app dependencies explicitly
    - Include migration task as first task when schema changes are needed
