  ## 3. BACKEND API (bidding-api)
  ═══════════════════════════════════════════════════════════════════════════════
  
  ### Technology Stack
  - PHP 8.1+ / Symfony 6.4
  - Doctrine ORM 2.12+ / MySQL 8.0
  - Redis 6.0+ (cache)
  - NelmioApiDocBundle 4.9+ (OpenAPI docs)
  - PHPUnit 10.5+ (testing)
  
  ### Request/Response Flow
  ```
  HTTP Request → Controller → Request DTO (validation) → Domain Service 
  → Repository → Response DTO → HTTP Response (JSON)
  ```
  
  ### Directory Structure
  ```
  bidding-api/src/
  ├── Command/                 # Console commands
  ├── Controller/Api/          # HTTP Controllers
  │   ├── Admin/              # Admin endpoints (Campaign, Class, Session, Simulation)
  │   ├── Student/            # Student endpoints (Bidding, CampusExchange, AddDrop)
  │   └── Webhook/            # MuleSoft webhooks
  ├── Domain/                  # Business Logic Services
  │   ├── Campaign/Service/   # CampaignService, UpdateCampaignService
  │   ├── Session/            # Session management
  │   ├── Bid/                # Bidding operations
  │   ├── Student/            # Student operations
  │   └── Simulation/         # Bid simulation engine
  ├── Dto/                     # Data Transfer Objects
  │   ├── Request/            # Input DTOs + validation + Transformer/
  │   └── Response/           # Output DTOs + Transformer/
  ├── Entity/                  # Doctrine Entities
  ├── Flow/                    # Flow Orchestration (FlowContext, BiddingFlow)
  ├── Module/                  # Modular Operations (Setup, Bidding, AddDrop, Waitlist)
  ├── Repository/              # Doctrine Repositories
  ├── Security/                # Auth (ApiTokenAuthenticator, UserProvider, Voter/)
  └── Service/                 # Cross-cutting (Mailer, Notification)
  ```
  
  ### Flow/Module Architecture (for complex operations)
  ```php
  // FlowContext carries data between modules
  $context = new FlowContext([
      'student' => $student,
      'session' => $session,
      'request' => $body,
  ]);
  $result = $module->execute($context);
  $flowResult = $flow->execute($context);
  ```
  
  ### Creating API Endpoints
  
  **Step 1: Request DTO**
  ```php
  // src/Dto/Request/CreateBidRequest.php
  class CreateBidRequest implements DtoInterface
  {
      #[Assert\NotBlank]
      #[Assert\Positive]
      public int $classId;
  
      #[Assert\NotBlank]
      #[Assert\Range(min: 0, max: 1000)]
      public int $points;
  }
  ```
  
  **Step 2: Controller**
  ```php
  // src/Controller/Api/Student/Bidding/CreateBidController.php
  #[Route('/api/student/bidding/{sessionId}/bid', methods: ['POST'])]
  #[OA\Post(summary: 'Create a new bid', tags: ['Student Bidding'])]
  public function __invoke(int $sessionId, CreateBidRequest $request, BidService $bidService): JsonResponse
  {
      $bidService->createBid($this->getStudent(), $sessionId, $request);
      return new JsonResponse([], Response::HTTP_CREATED);
  }
  ```
  
  **Step 3: Domain Service**
  ```php
  // src/Domain/Bid/Service/BidService.php
  public function createBid(Student $student, int $sessionId, CreateBidRequest $request): Bid
  {
      $session = $this->sessionRepository->find($sessionId);
      $class = $this->classesRepository->find($request->classId);
      $this->validateBid($student, $session, $class, $request->points);
      
      $bid = new Bid();
      $bid->setStudent($student)->setSession($session)->setClass($class)->setPoints($request->points);
      $this->bidRepository->save($bid, true);
      return $bid;
  }
  ```
  
  ### Security Configuration
  - `/api/webhook/*`: Basic auth (api_in_memory_users)
  - `/api/*`: Bearer token (ApiTokenAuthenticator)
  - Admin APIs require ROLE_ADMIN
  - Student APIs require ROLE_USER
  
  ### Database Migrations
  ```bash
  bin/console make:migration          # Generate migration
  bin/console doctrine:migrations:migrate   # Apply
  bin/console doctrine:migrations:migrate prev  # Rollback
  ```
  
  ### Doctrine Entity Pattern
  ```php
  #[ORM\Entity(repositoryClass: CampaignRepository::class)]
  #[ORM\Table(name: 'campaign')]
  #[ORM\HasLifecycleCallbacks]
  class Campaign
  {
      #[ORM\Id]
      #[ORM\GeneratedValue]
      #[ORM\Column(type: 'integer')]
      private ?int $id = null;
  
      #[ORM\Column(type: 'string', length: 255)]
      private string $name;
  
      #[ORM\OneToMany(mappedBy: 'campaign', targetEntity: Session::class)]
      private Collection $sessions;
  
      #[ORM\PrePersist]
      public function onPrePersist(): void { $this->createdAt = new \DateTime(); }
  }
  ```
  
  ### DTO Transformers
  ```php
  // Entity to Response DTO
  class BidResponseDtoTransformer
  {
      public function transformFromObject(Bid $bid): BidResponseDto
      {
          $dto = new BidResponseDto();
          $dto->id = $bid->getId();
          $dto->points = $bid->getPoints();
          $dto->status = $bid->getStatus()->value;
          return $dto;
      }
  }
  ```
  
