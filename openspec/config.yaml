  **Key patterns:**
  - One controller per action (single `__invoke` method) for most endpoints
  - DtoInterface + DtoArgumentResolver for request validation/hydration
  - Response Transformers (Dto/Response/Transformer/) for entity → DTO conversion
  - Flow/Module pattern for complex multi-step operations (bidding lifecycle)
  - Domain services hold business logic; repositories handle persistence
  - Constructor injection (autowire: true in services.yaml)
  - PHP 8.1 attributes for ORM mappings (`#[ORM\...]`) and routes (`#[Route(...)]`)
  - OpenAPI docs via NelmioApiDocBundle (`#[OA\...]` attributes)
  - PSR-12 coding standard

  **Auth & security:**
  - `/api/webhook/*` → Basic auth (ApiUserAuthenticator)
  - `/api/*` → Bearer token (ApiTokenAuthenticator)
  - Admin/Student UI → Azure OAuth + SAML SSO
  - Voter-based authorization for feature access and student session access

  **Testing:**
  - PHPUnit tests in `tests/Unit/{Controller/, Domain/}`
  - Follows arrange-act-assert pattern
  - Mock repositories and services

  ## Frontend — bidding-admin (Admin Dashboard)

  **Route structure** (`src/app/(authenticated)/`):
  campaign/, campuses/, course-list/, dashboard/, entry/, flex-switch/,
  integration/, mba/ (64 files — the main admin section), monitoring-analytics/,
  notification-centre/, preset/, programme/, students/, user-management/

  **API layer** (`src/src/` — domain-based folders):
  Each domain folder has: api service, React Query hooks, TypeScript types
  Domains: adjustment, admin-user, backup, bid, bidding, campaign-management,
  campus, class, config, course, dashboard, exchange, flex-switch, helpers,
  interfaces, monitoring-analytics, notification, preset, programme-management,
  promotion, role-management, session, simulation, sso, student,
  theme-management, user, user-management, utils

  **Tech stack:**
  - Next.js 14 App Router (`'use client'` for interactive components)
  - React Query for server state, Zustand for client state
  - Formik + Yup for form validation
  - TailwindCSS + Material UI 5.x for styling
  - SSO token service for authentication (src/sso-token-services.ts)

  ## Frontend — bidding-web (Student Portal)

  **Feature-based architecture** (`src/features/`):
  - auth/ — SSO login (components/, hooks/, services/, types/)
  - bidding/ — Main bidding UI (components/, constants/, hooks/, pages/, types/, utils/)
  - courses/ — Course browsing
  - dashboard/ — Student dashboard
  - notification/ — Notification center
  - profile/ — Student profile
  - switch/ — Flex switch / course switching

  **API layer** (`src/lib/api/`):
  - client-browser.ts / client-server.ts — Axios HTTP clients
  - interceptors.ts — Request/response interceptors
  - token-refresh.ts — Token refresh logic
  - mutations/ (5) — React Query mutations
  - queries/ (8) — React Query queries
  - services/ (8) — API service functions

  **Key types** (src/features/bidding/types/):
  CampaignBiddingResponse, FormValues (capital_granted/spent/left, credits,
  primary_course/backup_course), BiddingConfig, PrimaryBids, AvailableCourse

  **Key hooks** (src/features/bidding/hooks/):
  use-bidding-form, use-bidding-courses, use-course-conflicts,
  use-add-drop-waitlist-form, use-pre-bidding-form

  **Tech stack:**
  - Next.js 14 App Router
  - Ant Design (antd-provider) + TailwindCSS
  - React Query (query-provider), user context (user-provider), notification context
  - Custom Card/Modal/Table/ErrorBoundary components (src/components/)

  ## Key Business Rules

  1. **Capital allocation**: Students get minCapitalGranted–maxCapitalGranted points per campaign, distributed across bids per module
  2. **Credits**: minCreditsToFulfill–maxCreditsToFulfill per campaign
  3. **Bid types**: Primary and backup bids; backup_size configurable per campaign
  4. **Enrollment priority**: bid_points + gpa_score + essay_score; ties broken by timestamp
  5. **Campaign phases**: Defined via CampaignPhaseConfig, control available student actions at each point in time
  6. **Simulation**: SimulationRun calculates cutoff prices and allocates students to classes
  7. **Waitlist**: Auto-promotion when seats open, priority by bid points
  8. **Flex Switch**: Course switch request → file upload → approval workflow
  9. **Group bidding**: Students bid as groups with shared simulation
  10. **Course packs**: Bundled course ordering system
  11. **Feature flags**: FeatureAccess entity + FeatureAccessVoter control per-feature rollout

  ## Conventions

  **PHP / Symfony:**
  - PHP 8.1+ attributes (NOT annotations) for ORM and routes
  - PSR-12 coding standard
  - Constructor dependency injection (autowire: true)
  - Request DTOs implement DtoInterface, resolved by DtoArgumentResolver
  - Response DTOs use Transformer/ classes for entity → DTO conversion
  - Doctrine migrations in migrations/ (never manual SQL)
  - OpenAPI docs via `#[OA\...]` attributes (NelmioApiDocBundle)
  - One controller per action pattern (single __invoke method)
  - Status types are entity-based (not PHP enums) — use repository lookups

  **TypeScript / React:**
  - TypeScript strict mode
  - Next.js 14 App Router ('use client' for interactive components)
  - React Query for server state, Zustand for client state (bidding-admin only)
  - Formik + Yup for forms (bidding-admin), custom hooks (bidding-web)
  - ESLint + Prettier, conventional commits (commitlint)
  - Feature-based folders in bidding-web, domain-based folders in bidding-admin/src/src/

  ## Development

  ```bash
  bidding-api:    ./deploy/scripts/up-dev.sh && bin/console doctrine:migrations:migrate
  bidding-admin:  npm run start:dev  # port 4007
  bidding-web:    npm run start:dev  # port 4006
  ```

  Environments: DEV (.dev), INT (.int), UAT (.uat), PROD (bidding.insead.edu)
  Build variants: npm run build:{int,uat,prd}
  API docs: /api/doc (NelmioApiDocBundle)

  ## Brownfield Safety Rules (ALWAYS FOLLOW)

  1. **Never modify existing entity properties** without a Doctrine migration
  2. **Never remove or rename** existing API endpoints, entity fields, or enum values — only add new ones
  3. **Always check for in-flight campaigns/sessions** before changing behavior
  4. **All database changes** go through Doctrine migrations (with both up() and down() methods)
  5. **Test against existing data** — never assume empty tables
  6. **Feature flags** (FeatureAccess) for risky behavioral changes
  7. **Preserve existing Response DTO shapes** — add new fields but never remove/rename existing ones
  8. **Check webhook consumers** (MuleSoft) before changing webhook endpoint contracts

rules:
  proposal:
    # ---------- Safety & Scope ----------
    - Keep focused on a single feature or fix; avoid scope creep
    - Identify which apps are affected (api, admin, web) and their specific impact
    - "List affected entities, domain services, controllers, and repositories by exact name"
    - Note migration requirements (new columns, tables, indexes, data migrations)
    - Consider backward compatibility with live campaigns, active sessions, and existing student data
    - Identify if Flow/Module architecture applies (for multi-step bidding lifecycle operations)
    - "For bug fixes: describe the root cause, not just the symptom"
    - "For features: describe what ALREADY exists that is similar and how the new thing relates to it"

    # ---------- Risk Assessment ----------
    - Flag if any existing API endpoint response shape changes (breaking change risk)
    - Flag if any existing entity field is modified (migration risk)
    - Flag if webhook contract changes (external consumer risk — MuleSoft)
    - Flag if simulation logic changes (data integrity risk)
    - Note if feature flag (FeatureAccess) should be used for gradual rollout
    - Identify if existing unit tests need updating (regression risk)

  specs:
    # ---------- Scenario Format ----------
    - Use Given/When/Then format for all scenarios
    - Include API endpoint specs when applicable (method, path, request body, response shape)
    - Specify validation rules matching existing DtoInterface patterns

    # ---------- Coverage Requirements ----------
    - "Cover edge cases: active campaigns, in-progress simulations, concurrent bids, race conditions"
    - "Cover backward compatibility: existing data must continue to work unchanged"
    - Reference existing similar behavior before defining new behavior
    - Document impact on existing sessions/campaigns data
    - Include negative test scenarios (invalid input, missing permissions, expired sessions)

    # ---------- Brownfield Safety ----------
    - "For modified endpoints: show BOTH old and new response shapes, highlighting only additions"
    - "For new entities: document nullable vs required fields and default values for existing rows"
    - "For behavioral changes: document what happens to in-flight operations during deployment"

  design:
    # ---------- Pattern Adherence ----------
    - Check for similar implementations in the codebase FIRST before designing new patterns
    - Use existing patterns consistently
    - "Controller: use one-controller-per-action pattern with __invoke method"
    - "Request validation: DtoInterface + DtoArgumentResolver pattern"
    - "Response transformation: Dto/Response/Transformer/ classes"
    - "Complex operations: Flow/Module pattern (if multi-step, e.g., bidding lifecycle)"
    - "Feature flags: FeatureAccess entity + FeatureAccessVoter voter"
    - "Status values: entity-based status types (NOT PHP enums), resolved via repository"

    # ---------- Database & Migration Safety ----------
    - Plan Doctrine migration strategy with BOTH up() and down() methods
    - "New nullable columns: provide DEFAULT values so existing rows remain valid"
    - "New required columns: require a data migration step or a NOT NULL with default"
    - Consider query optimization (indexes, eager/lazy loading, DQL)
    - Never remove existing database columns — only add or soft-deprecate

    # ---------- API Contract Safety ----------
    - New fields in API responses are additive only (never remove/rename existing fields)
    - Specify exact file locations using actual project paths
    - Note if Transformer classes need updates for DTO changes
    - Plan backward compatibility for API consumers (admin & web frontends)

    # ---------- Frontend Impact ----------
    - Identify which frontend components need updating (exact file paths)
    - Plan React Query cache invalidation for affected queries
    - Consider loading/error states for new UI flows
    - Check if Formik/Yup schemas need updates (bidding-admin) or custom hooks (bidding-web)

  tasks:
    # ---------- Ordering ----------
    - "Dependency order: migration → entity changes → domain services → controllers → admin UI → web UI → tests"
    - "Always lead with migration task when schema changes are needed"
    - Mark cross-app dependencies explicitly (e.g., "requires API task #2 to be complete")

    # ---------- Sizing ----------
    - Keep individual tasks completable in one session (under 2 hours of focused work)
    - Split large services or components into separate tasks if needed
    - "If a task touches more than 5 files across different concerns, split it"

    # ---------- Specificity ----------
    - Include specific file paths (e.g., src/Entity/Campaign.php, src/Domain/Bid/Service/)
    - Reference existing patterns to follow (e.g., "follow CampaignController pattern")
    - Include exact Symfony commands (e.g., bin/console make:migration, bin/console doctrine:migrations:migrate)

    # ---------- Testing & Verification ----------
    - Add PHPUnit test task for every API change (tests/Unit/{Controller,Domain}/)
    - "For bug fixes: first task should be writing the failing test that reproduces the bug"
    - Include manual verification steps (curl commands or browser testing instructions)
    - Note which existing tests might be affected and need updating
    - "Final task: smoke test across all affected apps to verify no regression"
